services:
  marquez-db:
    image: postgres:14
    container_name: marquez-db
    environment:
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
      POSTGRES_DB: marquez
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "marquez"]
      interval: 5s
      timeout: 5s
      retries: 10

  marquez:
    build:
      context: .
      dockerfile: Dockerfile.marquez
    container_name: marquez
    ports:
      - "5000:5000"
      - "5001:5001"
    depends_on:
      marquez-db:
        condition: service_healthy

  marquez-web:
    image: marquezproject/marquez-web
    container_name: marquez-web
    environment:
      - MARQUEZ_HOST=marquez
      - MARQUEZ_PORT=5000
      - WEB_PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      - marquez